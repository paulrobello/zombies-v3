# Pre-commit hooks for par-zombie3.
# Install once with `pre-commit install` (not done automatically — the Makefile
# `pre-commit` target and CI invoke this config directly via `pre-commit run --all-files`).
# Hooks are revision-pinned; bump via Dependabot (see .github/dependabot.yml —
# github-actions ecosystem covers the workflow SHAs, but pre-commit revs are
# maintained manually here).
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: 8.30.1  # gitleaks v8.30.1 (2026-03-21) — pinned to latest stable tag
    hooks:
      - id: gitleaks
        # .claude/ is already gitignored, so the local dev token is invisible here.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0  # pre-commit-hooks v6.0.0 (2025-08-09)
    hooks:
      - id: detect-private-key
