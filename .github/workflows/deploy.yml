name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one in-flight deploy; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Pinned to commit SHAs (AUDIT SEC-004). Bump via Dependabot
      # (.github/dependabot.yml, github-actions ecosystem, weekly).
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          # DOC-010: concrete Node major instead of floating lts/*.
          # Must be >=22.15: webpack-dev-server@6 requires Node >=22.15.0.
          node-version: '22'
          cache: yarn
      - run: yarn install --frozen-lockfile
      # Run the full gate (typecheck + lint + test + build) in CI, not just `yarn build`.
      - run: make checkall
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0
      # Bake the custom domain into the published artifact. Pages source for
      # this repo is the dist/ artifact, so the CNAME must live there or a
      # future deploy would silently drop the custom domain.
      - name: Configure custom domain CNAME
        run: echo "zombies-v3.pardev.net" > dist/CNAME
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
