# Dependabot for par-zombie3.
# Keeps GitHub Actions pinned refs (see .github/workflows/deploy.yml — pinned to
# commit SHAs for supply-chain safety) current. Weekly cadence batches updates.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore(deps)
      include: scope
